<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS  </title>
    <link rel="stylesheet" href="rps.css">
</head>
<body>
    <h1>RPS</h1>
    <div class="choices">

    <div class="choice" id="rock">
    <img src="https://tse1.mm.bing.net/th/id/OIP.xOzTQ8Pw8X4O8Krl-Hd9iAHaHv?pid=Api&P=0&h=180" >
    <h3>rock</h3>
    </div>

     <div class="choice" id="paper">
    <img src="https://fairuzald.github.io/arc-rock-paper-scissors/src/img/paper.png" >
    <h3>paper</h3>
    </div>

     <div class="choice" id="scissors">
    <img src="https://fairuzald.github.io/arc-rock-paper-scissors/src/img/scissors.png" >
    <h3>scissors</h3>
    </div>
</div>


<div class="score-board">
    <div class="score">
        
        <p id="user_score">0</p>
        <p>You</p>
    </div>
        
    <div class="score">
       
        <p id="comp_score">0</p>
        
            <p>Comp</p>
    </div>
</div>

<div class="msg-container">
    <p id="msg">Play!!</p>
</div>
<script src="rps.js"></script>
</body>
</html>
